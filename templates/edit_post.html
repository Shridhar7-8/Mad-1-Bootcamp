<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0">Edit Post: {{ post.title }}</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('controllers.edit_post', post_id=post.id) }}">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" class="form-control" id="title" name="title" value="{{ post.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label">Content/Description</label>
                                <textarea class="form-control" id="content" name="content" rows="4" required>{{ post.content }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-select" id="status" name="status" required>
                                    <option value="Open" {% if post.status == 'Open' %}selected{% endif %}>Open</option>
                                    <option value="Closed" {% if post.status == 'Closed' %}selected{% endif %}>Closed</option>
                                </select>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a href="{{ url_for('controllers.admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
